<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>墨禾陶瓷 · 批发</title>
<style>
:root {
  --bg: #f5f0eb; --bg-card: rgba(255,255,255,0.72);
  --text: #2c2416; --text2: #8b7e6a; --text3: #b8a99a;
  --accent: #c4956a; --accent-light: #dbb896; --accent-dark: #a67c52;
  --accent-soft: rgba(196,149,106,0.12);
  --border: rgba(44,36,22,0.08);
  --shadow: 0 1px 3px rgba(44,36,22,0.04);
  --radius-sm: 10px; --radius-md: 16px; --radius-lg: 22px; --radius-xl: 28px;
  --safe-bottom: env(safe-area-inset-bottom, 20px);
  --header-h: 56px;
  --font: 'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-tap-highlight-color:transparent}
body{
  font-family:var(--font);background:#e8e3dc;color:var(--text);
  display:flex;justify-content:center;align-items:flex-start;
  min-height:100vh;min-height:100dvh;-webkit-font-smoothing:antialiased;
}
.app{
  width:100%;max-width:420px;min-height:100vh;min-height:100dvh;
  background:var(--bg);position:relative;overflow-x:hidden;
  box-shadow:0 12px 40px rgba(44,36,22,0.10);
}
.header{
  position:sticky;top:0;z-index:100;height:var(--header-h);padding:0 16px;
  display:flex;align-items:center;justify-content:space-between;
  backdrop-filter:blur(20px) saturate(1.4);-webkit-backdrop-filter:blur(20px) saturate(1.4);
  background:rgba(245,240,235,0.78);border-bottom:0.5px solid var(--border);
}
.header-brand{font-size:18px;font-weight:700;letter-spacing:-0.3px;cursor:pointer;user-select:none}
.header-brand span{color:var(--accent)}
.header-right{display:flex;align-items:center;gap:8px}
.header-loc{font-size:13px;color:var(--text2);padding:5px 12px;border-radius:20px;background:rgba(255,255,255,0.5)}
.header-admin{
  width:32px;height:32px;border-radius:50%;border:none;background:rgba(255,255,255,0.6);
  font-size:16px;cursor:pointer;display:none;align-items:center;justify-content:center;
  transition:all 0.2s;
}
.header-admin.active{background:var(--accent);color:#fff}
.header-admin.show{display:flex}

.cat-tabs-wrap{
  position:sticky;top:var(--header-h);z-index:99;
  backdrop-filter:blur(20px) saturate(1.4);-webkit-backdrop-filter:blur(20px) saturate(1.4);
  background:rgba(245,240,235,0.74);
}
.cat-tabs{display:flex;gap:4px;padding:8px 12px;overflow-x:auto;scrollbar-width:none}
.cat-tabs::-webkit-scrollbar{display:none}
.cat-tab{
  flex-shrink:0;padding:8px 16px;border-radius:20px;font-size:13.5px;font-weight:500;
  color:var(--text2);background:transparent;border:none;cursor:pointer;
  transition:all 0.25s ease;white-space:nowrap;
}
.cat-tab.active{background:var(--text);color:#faf8f4;font-weight:600;box-shadow:0 2px 8px rgba(44,36,22,0.15)}

/* ── Menu ── */
.menu-scroll{padding:0 14px 120px}
.menu-section{margin-top:20px}
.menu-section:first-child{margin-top:12px}
.section-title{font-size:15px;font-weight:600;margin-bottom:12px}
.section-count{font-size:12px;color:var(--text3);margin-left:4px;font-weight:400}

.drink-card{
  display:flex;gap:12px;padding:12px;margin-bottom:10px;border-radius:var(--radius-md);
  background:var(--bg-card);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:0.5px solid var(--border);box-shadow:var(--shadow);
  cursor:pointer;transition:all 0.2s ease;position:relative;overflow:hidden;
}
.drink-card:active{transform:scale(0.985)}
.drink-card .badge{
  position:absolute;top:6px;right:6px;font-size:10px;font-weight:600;padding:2px 7px;border-radius:8px;z-index:2;
}
.drink-card .badge.hot{color:#fff;background:#d4936a}
.drink-card .badge.new{color:var(--accent-dark);background:var(--accent-soft)}
.drink-card .badge.soldout{color:#999;background:rgba(0,0,0,0.06)}

.drink-img{
  width:88px;height:88px;border-radius:var(--radius-sm);flex-shrink:0;
  background:linear-gradient(135deg,#f0ebe2,#e8dfd4);
  display:flex;align-items:center;justify-content:center;font-size:36px;
  overflow:hidden;position:relative;
}
.drink-img img{width:100%;height:100%;object-fit:cover}
.drink-info{flex:1;display:flex;flex-direction:column;justify-content:space-between;min-width:0}
.drink-name{font-size:15px;font-weight:600}
.drink-desc{font-size:12px;color:var(--text3);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.drink-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.drink-price{font-size:17px;font-weight:700;color:var(--accent-dark)}
.drink-price::before{content:'¥';font-size:12px;font-weight:600}
.drink-add{
  width:28px;height:28px;border-radius:50%;background:var(--accent);
  border:none;color:#fff;font-size:18px;line-height:1;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.2s ease;flex-shrink:0;box-shadow:0 2px 8px rgba(196,149,106,0.3);
}
.drink-add:active{transform:scale(0.9);background:var(--accent-dark)}

/* ── Modal ── */
.modal-overlay{
  position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.35);
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  display:flex;align-items:flex-end;justify-content:center;animation:fadeIn 0.25s ease;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-sheet{
  width:100%;max-width:420px;max-height:88vh;background:#fafaf8;
  border-radius:var(--radius-xl) var(--radius-xl) 0 0;
  animation:slideUp 0.3s ease;display:flex;flex-direction:column;overflow:hidden;
  box-shadow:0 -8px 40px rgba(0,0,0,0.12);
}
.modal-handle{width:36px;height:4px;background:#d4cfc8;border-radius:2px;margin:10px auto 0}
.modal-body{overflow-y:auto;padding:0 20px 24px;flex:1}
.modal-img-wrap{
  width:100%;height:200px;border-radius:var(--radius-md);margin:12px 0 16px;
  background:linear-gradient(135deg,#f0ebe2,#e8dfd4);
  display:flex;align-items:center;justify-content:center;font-size:64px;overflow:hidden;
}
.modal-img-wrap img{width:100%;height:100%;object-fit:cover}
.modal-name{font-size:22px;font-weight:700}
.modal-price-big{font-size:20px;font-weight:700;color:var(--accent-dark);margin-top:4px}
.modal-price-big::before{content:'¥';font-size:14px}

.option-group{margin-top:20px}
.option-label{font-size:14px;font-weight:600;margin-bottom:10px}
.option-chips{display:flex;flex-wrap:wrap;gap:8px}
.option-chip{
  padding:8px 16px;border-radius:20px;font-size:13px;font-weight:500;
  color:var(--text2);background:rgba(44,36,22,0.04);border:0.5px solid transparent;
  cursor:pointer;transition:all 0.2s;
}
.option-chip.selected{color:var(--accent-dark);background:var(--accent-soft);border-color:var(--accent-light);font-weight:600}
.option-chip .price-tag{font-size:11px;color:var(--accent);margin-left:2px}

.modal-footer{
  padding:14px 20px calc(14px + var(--safe-bottom));border-top:0.5px solid var(--border);
  display:flex;align-items:center;gap:12px;
  background:rgba(255,255,255,0.7);backdrop-filter:blur(12px);
}
.modal-qty{display:flex;align-items:center;gap:14px}
.modal-qty button{
  width:32px;height:32px;border-radius:50%;border:0.5px solid var(--border);
  background:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.modal-qty button:active{background:#f0ebe2}
.modal-qty span{font-size:16px;font-weight:600;min-width:20px;text-align:center}
.modal-confirm{
  flex:1;padding:13px;background:var(--accent);border:none;color:#fff;
  font-size:15px;font-weight:600;border-radius:25px;cursor:pointer;letter-spacing:0.5px;
  box-shadow:0 4px 14px rgba(196,149,106,0.3);transition:all 0.2s;
}
.modal-confirm:active{background:var(--accent-dark);transform:scale(0.97)}

/* ── Cart ── */
.cart-bar{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:420px;z-index:150;padding:10px 14px calc(10px + var(--safe-bottom));
  background:rgba(250,248,245,0.82);backdrop-filter:blur(24px) saturate(1.6);
  border-top:0.5px solid var(--border);display:flex;align-items:center;gap:12px;
  box-shadow:0 -2px 20px rgba(44,36,22,0.05);
}
.cart-icon-wrap{position:relative;width:48px;height:48px;flex-shrink:0;cursor:pointer}
.cart-icon{
  width:48px;height:48px;border-radius:50%;background:var(--accent);border:none;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 14px rgba(196,149,106,0.35);transition:transform 0.2s;
}
.cart-icon svg{width:24px;height:24px;fill:#fff}
.cart-badge{
  position:absolute;top:-3px;right:-3px;min-width:18px;height:18px;border-radius:9px;
  background:#e25c3b;color:#fff;font-size:11px;font-weight:700;
  display:flex;align-items:center;justify-content:center;padding:0 5px;
  box-shadow:0 2px 6px rgba(226,92,59,0.4);
}
.cart-info{flex:1;min-width:0}
.cart-total{font-size:18px;font-weight:700}
.cart-total::before{content:'¥';font-size:13px}
.cart-hint{font-size:11px;color:var(--text3);margin-top:1px}
.btn-checkout{
  padding:12px 24px;border-radius:24px;background:var(--accent);border:none;color:#fff;
  font-size:15px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;
  box-shadow:0 4px 14px rgba(196,149,106,0.3);transition:all 0.2s;
}
.btn-checkout:disabled{background:#d4cfc8;cursor:not-allowed;box-shadow:none;color:#b8a99a}
.btn-checkout:not(:disabled):active{background:var(--accent-dark);transform:scale(0.97)}

/* Cart Drawer */
.cart-drawer{
  position:fixed;inset:0;z-index:210;background:rgba(0,0,0,0.35);
  backdrop-filter:blur(4px);display:flex;align-items:flex-end;justify-content:center;
  animation:fadeIn 0.2s ease;
}
.cart-drawer-sheet{
  width:100%;max-width:420px;max-height:70vh;background:#fafaf8;
  border-radius:var(--radius-xl) var(--radius-xl) 0 0;
  animation:slideUp 0.3s ease;display:flex;flex-direction:column;
}
.cart-drawer-header{padding:16px 20px 12px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.cart-drawer-title{font-size:16px;font-weight:700}
.btn-text{font-size:13px;color:var(--accent-dark);background:none;border:none;cursor:pointer;font-weight:500}
.cart-drawer-body{overflow-y:auto;flex:1;padding:8px 20px}
.cart-item{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:0.5px solid var(--border)}
.cart-item-img{
  width:52px;height:52px;border-radius:var(--radius-sm);flex-shrink:0;
  background:linear-gradient(135deg,#f0ebe2,#e8dfd4);
  display:flex;align-items:center;justify-content:center;font-size:22px;overflow:hidden;
}
.cart-item-img img{width:100%;height:100%;object-fit:cover}
.cart-item-info{flex:1;min-width:0}
.cart-item-name{font-size:14px;font-weight:600}
.cart-item-opts{font-size:11px;color:var(--text3);margin-top:2px}
.cart-item-price{font-size:14px;font-weight:700;color:var(--accent-dark);margin-top:4px}
.cart-item-price::before{content:'¥';font-size:10px}
.cart-item-qty{display:flex;align-items:center;gap:8px}
.cart-item-qty button{
  width:24px;height:24px;border-radius:50%;border:0.5px solid var(--border);
  background:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.cart-drawer-empty{text-align:center;padding:48px 20px;color:var(--text3)}
.cart-drawer-footer{
  padding:12px 20px calc(12px + var(--safe-bottom));border-top:0.5px solid var(--border);
  display:flex;align-items:center;gap:12px;
}

/* ── Toast ── */
.order-toast{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:300;
  text-align:center;animation:toastIn 0.4s ease;
}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,-50%) scale(0.8)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
.toast-card{
  background:rgba(255,255,255,0.92);backdrop-filter:blur(20px);
  border-radius:var(--radius-lg);padding:36px 32px;
  box-shadow:0 12px 40px rgba(44,36,22,0.10);
}
.toast-icon{width:64px;height:64px;border-radius:50%;background:#e8f5e9;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:32px}
.toast-title{font-size:20px;font-weight:700;margin-bottom:6px}
.toast-desc{font-size:14px;color:var(--text2);margin-bottom:8px}

/* ══════════════════════════════════════════════════════
   ADMIN PANEL
   ══════════════════════════════════════════════════════ */
.admin-panel{
  padding:0 14px 120px;display:none;
}
.admin-panel.show{display:block}
.admin-panel h2{font-size:18px;font-weight:700;margin:16px 0 12px;display:flex;align-items:center;gap:8px}
.admin-panel h2 .btn-text{margin-left:auto}

.cat-manage{
  background:var(--bg-card);backdrop-filter:blur(12px);border-radius:var(--radius-md);
  padding:12px 14px;margin-bottom:12px;
}
.cat-manage-title{font-size:14px;font-weight:600;margin-bottom:8px;display:flex;align-items:center}
.cat-manage-title .btn-text{margin-left:auto}
.cat-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.cat-name-input{
  flex:1;padding:6px 10px;border:1px solid var(--border);border-radius:8px;
  font-size:14px;font-family:var(--font);
}
.cat-name-input:focus{outline:none;border-color:var(--accent)}

.admin-item{
  background:var(--bg-card);backdrop-filter:blur(12px);border-radius:var(--radius-md);
  padding:14px;margin-bottom:10px;border:0.5px solid var(--border);
}
.admin-item.unavailable{opacity:0.5}
.admin-item-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.admin-item-img{
  width:56px;height:56px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(135deg,#f0ebe2,#e8dfd4);
  display:flex;align-items:center;justify-content:center;font-size:22px;overflow:hidden;
  cursor:pointer;position:relative;
}
.admin-item-img img{width:100%;height:100%;object-fit:cover}
.admin-item-img:hover::after{
  content:'📷';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,0.4);border-radius:10px;font-size:20px;
}
.admin-item-body{flex:1;min-width:0}
.admin-item-body input,.admin-item-body select{
  width:100%;padding:6px 8px;border:0.5px solid var(--border);border-radius:8px;
  font-size:13px;font-family:var(--font);background:#fff;margin-bottom:4px;
}
.admin-item-body input:focus,.admin-item-body select:focus{outline:none;border-color:var(--accent)}
.admin-item-body .row2{display:flex;gap:6px}
.admin-item-body .row2 input{flex:1;margin-bottom:0}
.admin-item-body .row2 select{width:70px;margin-bottom:0}
.admin-actions{display:flex;gap:6px;margin-top:6px}
.admin-actions button{
  padding:4px 12px;border-radius:14px;font-size:12px;font-weight:500;
  border:0.5px solid var(--border);cursor:pointer;background:#fff;transition:all 0.15s;
}
.admin-actions button:active{background:#f0ebe2}
.admin-actions button.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.admin-actions button.danger{color:#e25c3b;border-color:rgba(226,92,59,0.3)}

/* Upload overlay */
.upload-overlay{
  position:fixed;inset:0;z-index:400;background:rgba(0,0,0,0.5);
  display:flex;align-items:center;justify-content:center;animation:fadeIn 0.2s;
}
.upload-card{
  background:#fff;border-radius:var(--radius-lg);padding:24px;width:280px;text-align:center;
}
.upload-card h3{font-size:16px;margin-bottom:16px}
.upload-card input[type=file]{margin-bottom:12px}
.upload-card .preview{width:120px;height:120px;border-radius:12px;margin:0 auto 12px;background:#f0ebe2;overflow:hidden}
.upload-card .preview img{width:100%;height:100%;object-fit:cover}
.upload-card .btns{display:flex;gap:8px;justify-content:center}
.upload-card .btns button{
  padding:8px 20px;border-radius:20px;font-size:14px;border:none;cursor:pointer;font-weight:600;
}
.upload-card .btns .cancel{background:#f0ebe2;color:var(--text2)}
.upload-card .btns .confirm{background:var(--accent);color:#fff}
.upload-card .btns .confirm:disabled{opacity:0.5;cursor:not-allowed}

/* Utility */
.hidden{display:none!important}
.loading{text-align:center;padding:60px 20px;color:var(--text3);font-size:14px}
.toast-msg{
  position:fixed;bottom:100px;left:50%;transform:translateX(-50%);z-index:350;
  background:var(--text);color:#fff;padding:8px 20px;border-radius:20px;
  font-size:14px;animation:fadeIn 0.3s;white-space:nowrap;
}

/* Bottom tabs */
.tab-bar{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);z-index:100;
  width:100%;max-width:420px;background:rgba(255,255,255,0.95);backdrop-filter:blur(12px);
  border-top:0.5px solid var(--border);display:flex;padding:6px 0 calc(6px + var(--safe-bottom));
}
.tab-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  background:none;border:none;font-size:11px;color:var(--text3);cursor:pointer;
  padding:4px 0;font-family:var(--font);position:relative;
}
.tab-btn.active{color:var(--accent-dark)}
.tab-btn .tab-icon{font-size:20px}

/* Search bar */
.search-bar{
  display:flex;align-items:center;gap:8px;padding:8px 14px;
  background:rgba(0,0,0,0.04);border-radius:24px;margin:8px 14px;
}
.search-bar input{
  flex:1;border:none;background:none;font-size:14px;outline:none;font-family:var(--font);
}

/* Banner */
.banner-area{
  margin:4px 14px 8px;height:150px;border-radius:var(--radius-md);
  background:linear-gradient(135deg,#e8dfd4,#d4c8b8,#c4b5a0);
  display:flex;align-items:center;justify-content:center;
  color:var(--text2);font-size:14px;overflow:hidden;
}
.banner-area img{width:100%;height:100%;object-fit:cover}

/* Contact bar */
.contact-bar{
  display:flex;align-items:center;justify-content:space-between;gap:8px;
  padding:10px 14px;margin:0 14px 8px;
  background:rgba(255,255,255,0.6);backdrop-filter:blur(8px);
  border-radius:12px;font-size:12px;line-height:1.5;
}
.contact-bar .addr{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text2)}
.contact-phone{
  display:inline-flex;align-items:center;gap:4px;color:var(--accent-dark);
  text-decoration:none;font-weight:600;font-size:13px;
  background:rgba(161,128,84,0.1);padding:6px 12px;border-radius:20px;
  white-space:nowrap;transition:all 0.2s;
}
.contact-phone:hover{background:rgba(161,128,84,0.2)}

/* Product grid (2 columns) */
.product-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 14px 90px;
}
.product-card{
  background:var(--bg-card);border-radius:var(--radius-md);overflow:hidden;
  box-shadow:var(--shadow);cursor:pointer;
}
.product-card-img{
  width:100%;aspect-ratio:1;background:linear-gradient(135deg,#f0ebe2,#e8dfd4);
  display:flex;align-items:center;justify-content:center;font-size:40px;
}
.product-card-img img{width:100%;height:100%;object-fit:cover}
.product-card-info{padding:8px 10px}
.product-card-name{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.product-card-desc{font-size:11px;color:var(--text3);margin:2px 0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.product-card-bottom{display:flex;justify-content:space-between;align-items:center}
.product-card-price{font-size:15px;font-weight:700;color:var(--accent-dark)}
.product-card-price::before{content:'¥';font-size:11px}
.product-card-add{
  width:26px;height:26px;border-radius:50%;background:var(--accent);color:#fff;
  border:none;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.fav-btn{
  position:absolute;top:4px;right:4px;width:28px;height:28px;border-radius:50%;
  background:rgba(255,255,255,0.7);border:none;font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;z-index:2;backdrop-filter:blur(4px);
}

}

.cart-page{padding:0 14px 90px}

.cart-page-name{font-size:14px;font-weight:600}

.cart-page-price{font-size:14px;font-weight:700;color:var(--accent-dark)}
.cart-page-actions{display:flex;align-items:center;gap:8px}
.cart-page-actions button{
  width:28px;height:28px;border-radius:50%;border:0.5px solid var(--border);
  background:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.cart-page-footer{
  position:fixed;bottom:60px;left:50%;transform:translateX(-50%);z-index:99;
  width:100%;max-width:420px;padding:12px 14px;
  background:rgba(255,255,255,0.95);backdrop-filter:blur(12px);
  border-top:0.5px solid var(--border);display:flex;align-items:center;gap:12px;
}
.cart-page-footer button{
  flex:1;padding:12px;border-radius:24px;border:none;font-size:15px;font-weight:600;cursor:pointer;

@media(max-width:360px){

  .drink-name{font-size:14px}
  .modal-img-wrap{height:160px}
}
</style>
</head>
<body>

<div class="app" id="app">
  <header class="header">
    <div class="header-brand" id="brandClick">墨禾<span>·</span>陶瓷</div>
    <div class="header-loc" id="headerLoc"></div>
    <button class="header-admin" id="adminToggle" title="管理">⚙️</button>
  </header>

  <div class="tab-content" id="tabContent"></div>

  <div id="shopCartBar" style="position:fixed;bottom:60px;left:50%;transform:translateX(-50%);z-index:90;width:100%;max-width:420px;cursor:pointer;display:none" onclick="toggleShopCartExpand()">
    <div style="background:rgba(44,36,22,0.92);backdrop-filter:blur(12px);padding:10px 14px;display:flex;align-items:center;justify-content:space-between">
      <div><span style="color:#fff;font-size:14px;font-weight:700" id="shopCartCount"></span><span style="color:rgba(255,255,255,0.6);font-size:12px;margin-left:4px">件</span> <span style="color:var(--accent-light);font-size:16px;font-weight:700;margin-left:8px" id="shopCartTotal"></span></div>
      <button onclick="event.stopPropagation();switchTab(2)" style="padding:8px 20px;background:var(--accent);color:#fff;border:none;border-radius:20px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font)">去结算</button>
    </div>
    <div id="shopCartExpand" style="display:none;background:#fff;max-height:240px;overflow-y:auto;border-radius:0 0 12px 12px;padding:0 14px"></div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab(0)"><span class="tab-icon">🏠</span>商城</button>
    <button class="tab-btn" onclick="switchTab(1)"><span class="tab-icon">🔍</span>分类</button>
    <button class="tab-btn" onclick="switchTab(2)"><span class="tab-icon">🛒</span>购物车<span class="cart-badge hidden" id="tabCartBadge">0</span></button>
    <button class="tab-btn" onclick="switchTab(3)"><span class="tab-icon">👤</span>我的</button>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay hidden" id="modalOverlay"><div class="modal-sheet" id="modalSheet">
  <div class="modal-handle"></div><div class="modal-body" id="modalBody"></div><div class="modal-footer" id="modalFooter"></div>
</div></div>

<!-- Cart Drawer -->
<div class="cart-drawer hidden" id="cartDrawer"><div class="cart-drawer-sheet" id="cartDrawerSheet">
  <div class="cart-drawer-header"><div class="cart-drawer-title">🛒 购物车</div><button class="btn-text" id="cartClearBtn">清空</button></div>
  <div class="cart-drawer-body" id="cartDrawerBody"></div>
  <div class="cart-drawer-footer"><span class="cart-total" id="cartDrawerTotal">0</span><button class="btn-checkout" id="cartDrawerCheckout" disabled>提交询价</button></div>
</div></div>

<!-- Admin Login Overlay -->
<div class="upload-overlay hidden" id="loginOverlay"><div class="upload-card">
  <h3>🔐 管理后台登录</h3>
  <input type="password" id="loginPassword" placeholder="请输入管理密码" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:10px;font-size:15px;margin-bottom:12px;text-align:center;font-family:var(--font)">
  <div id="loginError" style="color:#e25c3b;font-size:13px;margin-bottom:8px;display:none"></div>
  <div class="btns"><button class="cancel" id="loginCancel">取消</button><button class="confirm" id="loginConfirm">登录</button></div>
</div></div>

<!-- Image Upload Overlay -->
<div class="upload-overlay hidden" id="uploadOverlay"><div class="upload-card">
  <h3>上传图片</h3>
  <div class="preview" id="uploadPreview"></div>
  <input type="file" id="uploadFileInput" accept="image/*">
  <div class="btns"><button class="cancel" id="uploadCancel">取消</button><button class="confirm" id="uploadConfirm" disabled>确认上传</button></div>
</div></div>

<!-- Add Product Overlay -->
<div class="upload-overlay hidden" id="addOverlay"><div class="upload-card">
  <h3>＋ 新增产品</h3>
  <input type="hidden" id="addItemId">
  <input id="addItemName" placeholder="产品名称" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:10px;font-size:15px;margin-bottom:8px;font-family:var(--font)">
  <textarea id="addItemDesc" placeholder="产品描述" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:10px;font-size:14px;margin-bottom:8px;font-family:var(--font);resize:vertical" rows="2"></textarea>
  <div style="display:flex;gap:8px;margin-bottom:8px">
    <input type="number" id="addItemPrice" placeholder="价格" step="0.5" style="flex:1;padding:10px;border:1px solid #ddd;border-radius:10px;font-size:15px;font-family:var(--font)">
    <select id="addItemCat" style="flex:1;padding:10px;border:1px solid #ddd;border-radius:10px;font-size:14px;font-family:var(--font)">
      <option value="hot">🔥 热销推荐</option><option value="tableware">🍽️ 餐具系列</option><option value="teaset">🍵 茶具系列</option><option value="vase">🏺 花瓶摆件</option><option value="custom">🎨 手工定制</option>
    </select>
  </div>
  <div class="btns"><button class="cancel" onclick="closeAddModal()">取消</button><button class="confirm" onclick="addNewItem()">确认添加</button></div>
</div></div>

<script>
// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let menuData=[], optionsData={temperature:[],sweetness:[],toppings:[]}, cart=[], currentDrink=null;
let currentSel={temperature:'正常冰',sweetness:'标准糖',toppings:[],qty:1};
let isAdmin=false, adminItems=[], adminCats=[];
let uploadTargetItemId=null, uploadFile=null;
let adminToken=localStorage.getItem('guming_admin_token')||'';
let currentUser=null;let userToken='';
let favorites=[];
let currentTab=0;
const API='';

// ══════════════════════════════════════════════
//  API
// ══════════════════════════════════════════════
async function api(path,opts={}){
  if(adminToken && opts.method && opts.method!=='GET'){
    opts.headers=opts.headers||{};
    opts.headers['Authorization']='Bearer '+adminToken;
  }
  const r=await fetch(API+path,opts);
  if(r.status===401){adminToken='';localStorage.removeItem('guming_admin_token');isAdmin=false;toggleAdmin();throw new Error('登录已过期')}
  if(!r.ok)throw new Error((await r.json()).detail||'请求失败');
  return r.json();
}

async function adminApi(path,opts={}){
  opts.headers=opts.headers||{};
  opts.headers['Authorization']='Bearer '+adminToken;
  const r=await fetch(API+path,opts);
  if(r.status===401){adminToken='';localStorage.removeItem('guming_admin_token');isAdmin=false;toggleAdmin();throw new Error('登录已过期，请重新登录')}
  if(!r.ok)throw new Error((await r.json()).detail||'请求失败');
  return r.json();
}

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
async function init(){
  try{
    await Promise.all([fetchMenu(),fetchOptions()]);loadSiteConfig();
    setupModalListeners();setupCartListeners();setupAdminListeners();
    loadUserSession();
    switchTab(0);
  }catch(e){
    document.getElementById('tabContent').innerHTML=`<div class="loading">⚠️ ${e.message}<br><small>请确认后端已启动</small></div>`;
  }
}

async function fetchMenu(){
  const d=await api('/api/menu');
  menuData=d.categories;
}
async function fetchOptions(){
  optionsData=await api('/api/options');
  currentSel.temperature=optionsData.temperature[0]||'正常冰';
  currentSel.sweetness=optionsData.sweetness[0]||'标准糖';
}
async function fetchAdminItems(){
  const d=await adminApi('/api/admin/menu-items');
  adminItems=d.items;adminCats=d.categories;
}

// ══════════════════════════════════════════════
//  RENDER MENU
// ══════════════════════════════════════════════
function renderAll(){renderTabs();renderMenu();updateCartUI();}

function renderTabs(){
  const el=document.getElementById('catTabs');
  el.innerHTML=menuData.map((c,i)=>`<button class="cat-tab${i===0?' active':''}" data-cat="${c.id}">${c.name}</button>`).join('');
  el.querySelectorAll('.cat-tab').forEach(b=>b.addEventListener('click',()=>scrollToCat(b.dataset.cat,b)));
}

function renderMenu(){
  const el=document.getElementById('menuScroll');
  el.innerHTML=menuData.map(cat=>`
    <div class="menu-section" id="cat-${cat.id}">
      <div class="section-title">${cat.name}<span class="section-count">${cat.items.length}款</span></div>
      ${cat.items.map(it=>`
        <div class="drink-card" data-cat="${cat.id}" data-item="${it.id}">
          ${it.badge?`<span class="badge ${it.badge}">${it.badge==='hot'?'热卖':it.badge==='new'?'上新':it.badge}</span>`:''}
          <div class="drink-img">${imgOrEmoji(it.image_url,it.id)}</div>
          <div class="drink-info">
            <div class="drink-name">${it.name}</div>
            <div class="drink-desc">${it.desc}</div>
            <div class="drink-bottom"><div class="drink-price">${it.price}</div><button class="drink-add" data-cat="${cat.id}" data-item="${it.id}">+</button></div>
          </div>
        </div>`).join('')}
    </div>`).join('');

  el.querySelectorAll('.drink-card').forEach(c=>c.addEventListener('click',e=>{if(e.target.closest('.drink-add'))return;openDetail(c.dataset.cat,c.dataset.item)}));
  el.querySelectorAll('.drink-add').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();quickAdd(b.dataset.cat,b.dataset.item)}));
}

function imgOrEmoji(imageUrl,itemId){
  if(imageUrl) return `<img src="${imageUrl}" alt="" onerror="this.parentElement.innerHTML='🏺'">`;
  const emojis={h1:'🍚',h2:'🫖',h3:'🏺',h4:'🍽️',h5:'☕',t1:'🍛',t2:'🥣',t3:'🍲',t4:'🍜',s1:'🫖',s2:'🍵',s3:'🐉',s4:'🎒',v1:'🏺',v2:'🌸',v3:'🌵',c1:'🖨️',c2:'🎁',c3:'👨‍🎨'};
  return emojis[itemId]||'🏺';
}

let catObserver;
function setupCatObserver(){
  catObserver=new IntersectionObserver(e=>{
    const v=e.filter(x=>x.isIntersecting).sort((a,b)=>a.boundingClientRect.top-b.boundingClientRect.top);
    if(v.length) document.querySelectorAll('.cat-tab').forEach(t=>t.classList.toggle('active',t.dataset.cat===v[0].target.id.replace('cat-','')));
  },{rootMargin:'-120px 0px 0px 0px'});
  menuData.forEach(c=>{const el=document.getElementById('cat-'+c.id);if(el)catObserver.observe(el)});
}
function scrollToCat(catId,btn){
  document.querySelectorAll('.cat-tab').forEach(t=>t.classList.remove('active'));btn.classList.add('active');
  const t=document.getElementById('cat-'+catId);if(t)window.scrollTo({top:t.getBoundingClientRect().top+window.scrollY-110,behavior:'smooth'});
}

// ══════════════════════════════════════════════
//  TAB NAVIGATION
// ══════════════════════════════════════════════
function switchTab(n){
  currentTab=n;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===n));
  if(isAdmin){toggleAdmin();return}
  if(n===0){renderShop();setTimeout(updateCartUI,300)}
  else if(n===1) renderCategories();
  else if(n===2) renderCartPage();
  else if(n===3) renderMyPage();
  document.getElementById('tabContent').scrollTop=0;
}
async function refreshSite(){
  await loadSiteConfig();updateAddressDisplay();
}

// ══════════════════════════════════════════════
//  TAB 0: 商城 (SHOP)
// ══════════════════════════════════════════════
function searchProducts(query){
  const q=query.toLowerCase().trim();
  const allItems=[];
  menuData.forEach(cat=>cat.items.forEach(it=>allItems.push({...it,catId:cat.id})));
  if(!q) return allItems;
  return allItems.filter(it=>it.name.toLowerCase().includes(q)||(it.desc||'').toLowerCase().includes(q));
}

let siteConfig={phone:'',banner:'',address:'景德镇市珠山区'};
async function loadSiteConfig(){
  try{const c=await api('/api/payment');siteConfig={phone:c.phone||'',banner:c.banner||'',address:c.address||'景德镇市珠山区'};}catch(e){}
  updateAddressDisplay();
}
function updateAddressDisplay(){
  const hl=document.getElementById('headerLoc');
  if(hl) hl.textContent='📍 景德镇';
  const sa=document.getElementById('shopAddr');
  if(sa) sa.textContent='📍 '+siteConfig.address;
  const sp=document.getElementById('shopPhone');
  if(sp){
    if(siteConfig.phone) sp.innerHTML='📞 <a class="contact-phone" href="javascript:void(0)" onclick="this.textContent=\''+siteConfig.phone+'\';this.href=\'tel:'+siteConfig.phone+'\'" style="text-decoration:none;font-weight:600">电话</a>';
    else sp.innerHTML='📞 <span class="contact-phone" style="cursor:default">电话</span>';
  }
}

function renderShop(){
  const el=document.getElementById('tabContent');
  el.innerHTML=`
    <div class="search-bar">
      <span style="font-size:16px">🔍</span>
      <input type="text" id="shopSearch" placeholder="搜索产品..." oninput="renderShopGrid(this.value)">
    </div>
    <div class="banner-area" id="bannerArea">
      ${siteConfig.banner?`<img src="${siteConfig.banner}" alt="">`:'🏺 墨禾陶瓷 · 匠心手作'}
    </div>
    <div class="contact-bar">
      <span class="addr" id="shopAddr"></span>
      <span id="shopPhone">📞 电话</span>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;margin:0 14px 8px;background:var(--bg-card);border-radius:12px;cursor:pointer" onclick="switchTab(1)">
      <span style="font-size:14px;font-weight:600">🔥 好物推荐</span>
      <span style="font-size:12px;color:var(--accent-dark)">查看全部分类 ›</span>
    </div>
    <div style="padding:4px 14px 6px"><span style="font-size:14px;font-weight:700">📦 全部商品</span></div>
    <div class="product-grid" id="shopGrid"></div>`;
  renderShopGrid('');
  setTimeout(updateCartUI,200);
  setTimeout(updateAddressDisplay,300);
}

function renderShopGrid(query){
  const grid=document.getElementById('shopGrid');
  if(!grid) return;
  const items=searchProducts(query);
  if(!items.length){grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text3)">未找到产品</div>';return}
  grid.innerHTML=items.map(it=>`
    <div class="product-card" onclick="openDetail('${it.catId}','${it.id}')">
      <div class="product-card-img">${imgOrEmoji(it.image_url,it.id)}<button class="fav-btn" onclick="event.stopPropagation();toggleFavorite('${it.catId}','${it.id}','${it.name.replace(/'/g,"\\'")}')" title="收藏">${isFavorited(it.id)?'❤️':'🤍'}</button></div>
      <div class="product-card-info">
        <div class="product-card-name">${it.name}</div>
        <div class="product-card-desc">${it.desc||''}</div>
        <div class="product-card-bottom">
          <div class="product-card-price">${it.price}</div>
          <button class="product-card-add" onclick="event.stopPropagation();quickAdd('${it.catId}','${it.id}')">+</button>
        </div>
      </div>
    </div>`).join('');
}

// ══════════════════════════════════════════════
//  TAB 1: 分类 (CATEGORIES)
// ══════════════════════════════════════════════
let catSort='default'; // default, new, price-desc
let selectedCatId=null;

function renderCategories(){
  selectedCatId=null;catSort='default';
  const el=document.getElementById('tabContent');
  el.innerHTML=`
    <div style="display:flex;height:calc(100vh - 110px)">
      <div id="catSidebar" style="width:90px;background:#f8f5f0;overflow-y:auto;flex-shrink:0;padding:4px 0">
        ${menuData.map(c=>`<div class="cat-side-item" data-cat="${c.id}" onclick="selectCategory('${c.id}')" style="padding:12px 8px;text-align:center;font-size:12px;color:var(--text2);cursor:pointer;border-right:3px solid transparent">${c.name.replace(/[🔥🍽️🍵🏺🎨 ]/g,'').trim()||c.name}<br><span style="font-size:10px;color:var(--text3)">${c.items.length}件</span></div>`).join('')}
      </div>
      <div style="flex:1;overflow-y:auto;padding:0 10px 20px">
        <div style="display:flex;gap:6px;padding:10px 0;position:sticky;top:0;background:var(--bg);z-index:2">
          ${[['default','🔥 销量优先'],['new','🆕 最新上架'],['price-desc','💰 价格↓']].map(([k,v])=>`<button class="sort-btn${catSort===k?' active':''}" onclick="setCatSort('${k}')" style="flex:1;padding:6px 0;border-radius:16px;border:0.5px solid var(--border);background:${catSort===k?'var(--accent-soft)':'#fff'};font-size:12px;cursor:pointer;font-family:var(--font)">${v}</button>`).join('')}
        </div>
        <div class="product-grid" id="catProductGrid" style="padding:0">${renderAllCatProducts()}</div>
      </div>
    </div>`;
  if(menuData.length) selectCategory(menuData[0].id);
}

function renderAllCatProducts(){
  let items=[];
  if(selectedCatId){const c=menuData.find(x=>x.id===selectedCatId);if(c)items=[...c.items];}
  else items=menuData.flatMap(c=>c.items);
  if(catSort==='new') items.sort((a,b)=>b.id.localeCompare(a.id));
  else if(catSort==='price-desc') items.sort((a,b)=>b.price-a.price);
  return items.map(it=>{
    const cid=menuData.find(c=>c.items.some(i=>i.id===it.id))?.id||'';
    return `<div class="product-card" onclick="openDetail('${cid}','${it.id}')">
      <div class="product-card-img">${imgOrEmoji(it.image_url,it.id)}<button class="fav-btn" onclick="event.stopPropagation();toggleFavorite('${cid}','${it.id}','${it.name.replace(/'/g,"\\'")}')" title="收藏">${isFavorited(it.id)?'❤️':'🤍'}</button></div>
      <div class="product-card-info"><div class="product-card-name">${it.name}</div><div class="product-card-desc">${it.desc||''}</div>
      <div class="product-card-bottom"><div class="product-card-price">${it.price}</div><button class="product-card-add" onclick="event.stopPropagation();quickAdd('${cid}','${it.id}')">+</button></div></div>
    </div>`;
  }).join('');
}

function selectCategory(catId){
  selectedCatId=catId;
  document.querySelectorAll('.cat-side-item').forEach(el=>{el.style.background='';el.style.borderRightColor='transparent';el.style.color='var(--text2)';el.style.fontWeight='normal'});
  const el=document.querySelector(`.cat-side-item[data-cat="${catId}"]`);
  if(el){el.style.background='#fff';el.style.borderRightColor='var(--accent-dark)';el.style.color='var(--accent-dark)';el.style.fontWeight='600'}
  const grid=document.getElementById('catProductGrid');if(grid)grid.innerHTML=renderAllCatProducts();
}

function setCatSort(sort){
  catSort=sort;
  document.querySelectorAll('.sort-btn').forEach(b=>{b.style.background='#fff';b.classList.remove('active')});
  const btn=event.target;btn.style.background='var(--accent-soft)';btn.classList.add('active');
  const grid=document.getElementById('catProductGrid');if(grid)grid.innerHTML=renderAllCatProducts();
}

// ══════════════════════════════════════════════
//  TAB 2: 购物车 (CART PAGE)
// ══════════════════════════════════════════════
function renderCartPage(){
  const el=document.getElementById('tabContent');
  const cnt=cartCount(),tot=cartTotal();
  if(!cart.length){
    el.innerHTML=`
      <div class="cart-page">
        <div class="cart-page-empty">
          <div style="font-size:56px">🛒</div>
          <p style="margin-top:12px">购物车是空的</p>

function cartPageQty(idx,d){

  renderCartPage();
}

async function userLogin(){
  const phone=document.getElementById('loginPhone').value.trim();

  try{
    const r=await api('/api/user/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone})});
    currentUser=r.user;userToken=r.token;localStorage.setItem('mohe_user',JSON.stringify({phone:r.user.phone,token:r.token}));
    await loadFavorites();
    renderMyPage();flashMsg('✅ 登录成功');

async function fetchUserOrders(status){

  if(!r.ok)throw new Error('获取订单失败');
  return r.json();
}

// Favorite toggle functions
function isFavorited(itemId){
  return favorites.some(f=>f.item_id===itemId);
}
async function toggleFavorite(catId,itemId,itemName){
  if(!currentUser){needLogin();return}
  const idx=favorites.findIndex(f=>f.item_id===itemId);
  try{
    if(idx>=0){
      await fetch(`/api/user/favorites/${itemId}`,{method:'DELETE',headers:{'Authorization':'Bearer '+userToken}});
      favorites.splice(idx,1);
    }else{
      await fetch(`/api/user/favorites/${itemId}`,{method:'POST',headers:{'Authorization':'Bearer '+userToken}});
      favorites.push({category_id:catId,item_id:itemId,item_name:itemName});
    }
    // Re-render if in shop or categories
    if(currentTab===0) renderShopGrid(document.getElementById('shopSearch')?.value||'');
    else if(currentTab===1) renderCategories();
    else renderMyPage();
  }catch(e){flashMsg('❌ '+e.message)}
}

function setupModalListeners(){
  document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal()});
  document.getElementById('modalSheet').addEventListener('click',function(e){e.stopPropagation()});
}
async function openDetail(catId,itemId){
  const d=findDrink(catId,itemId);if(!d)return;
  currentDrink={catId,itemId,...d};
  // Load product-specific options
  try{
    const r=await fetch('/api/options?item_id='+itemId);
    if(r.ok){const opts=await r.json();optionsData=opts}
  }catch(e){}
  currentSel={temperature:optionsData.temperature[0]||'中号',sweetness:optionsData.sweetness[0]||'白釉',toppings:[],qty:1};
  renderModal();
  document.getElementById('modalOverlay').classList.remove('hidden');document.body.style.overflow='hidden';
}
function closeModal(){document.getElementById('modalOverlay').classList.add('hidden');document.body.style.overflow='';currentDrink=null}
function findDrink(catId,itemId){const c=menuData.find(x=>x.id===catId);return c?c.items.find(x=>x.id===itemId):null}

function renderModal(){
  if(!currentDrink)return;
  const d=currentDrink;
  const tp=currentSel.toppings.reduce((s,t)=>{const o=optionsData.toppings.find(x=>x.name===t);return s+(o?o.price:0)},0);
  const total=(d.price+tp)*currentSel.qty;
  document.getElementById('modalBody').innerHTML=`
    <div class="modal-img-wrap">${d.image_url?`<img src="${d.image_url}" alt="">`:d.emoji||'🏺'}<button class="fav-btn" style="top:8px;right:8px" onclick="event.stopPropagation();toggleFavorite('${currentDrink.catId}','${currentDrink.itemId}','${d.name.replace(/'/g,"\\'")}')" title="收藏">${isFavorited(currentDrink.itemId)?'❤️':'🤍'}</button></div>
    <div class="modal-name">${d.name}</div><div class="modal-price-big" id="modalUnitPrice">${d.price+tp}</div>
    <div class="option-group"><div class="option-label">尺寸</div><div class="option-chips" id="chips-temp"></div></div>
    <div class="option-group"><div class="option-label">釉色</div><div class="option-chips" id="chips-sweet"></div></div>
    <div class="option-group"><div class="option-label">工艺</div><div class="option-chips" id="chips-topping"></div></div>`;
  populateChips('chips-temp',optionsData.temperature.map(t=>({name:t})),currentSel.temperature,false);
  populateChips('chips-sweet',optionsData.sweetness.map(s=>({name:s})),currentSel.sweetness,false);
  populateChips('chips-topping',optionsData.toppings,currentSel.toppings,true);
  document.getElementById('modalFooter').innerHTML=`
    <div class="modal-qty"><button id="modalQtyDown">−</button><span id="modalQtyVal">${currentSel.qty}</span><button id="modalQtyUp">+</button></div>
    <button class="modal-confirm" id="modalConfirmBtn">加入询价单 ¥${total}</button>`;
  document.getElementById('modalQtyDown').addEventListener('click',()=>changeQty(-1));
  document.getElementById('modalQtyUp').addEventListener('click',()=>changeQty(1));
  document.getElementById('modalConfirmBtn').addEventListener('click',addToCart);
}

function populateChips(containerId,choices,selected,isTopping){
  const c=document.getElementById(containerId);if(!c)return;c.innerHTML='';
  choices.forEach(ch=>{
    const n=ch.name,b=document.createElement('button');b.className='option-chip';
    if(isTopping){if(Array.isArray(selected)&&selected.includes(n))b.classList.add('selected');b.textContent=n;
      const t=document.createElement('span');t.className='price-tag';t.textContent='+¥'+ch.price;b.appendChild(t);
      b.addEventListener('click',e=>{e.stopPropagation();toggleTopping(n)});
    }else{if(n===selected)b.classList.add('selected');b.textContent=n;
      b.addEventListener('click',e=>{e.stopPropagation();selectOption(containerId.includes('temp')?'temperature':'sweetness',n)});
    }c.appendChild(b);
  });
}

function updateModalAfterChange(){
  if(!currentDrink)return;
  const tp=currentSel.toppings.reduce((s,t)=>{const o=optionsData.toppings.find(x=>x.name===t);return s+(o?o.price:0)},0);
  const total=(currentDrink.price+tp)*currentSel.qty;
  const u=document.getElementById('modalUnitPrice');if(u)u.textContent=currentDrink.price+tp;
  const q=document.getElementById('modalQtyVal');if(q)q.textContent=currentSel.qty;
  const b=document.getElementById('modalConfirmBtn');if(b)b.textContent='加入询价单 ¥'+total;
  updateChipSelections('chips-temp',currentSel.temperature);updateChipSelections('chips-sweet',currentSel.sweetness);updateChipSelections('chips-topping',currentSel.toppings);
}
function updateChipSelections(id,sel){
  const c=document.getElementById(id);if(!c)return;
  c.querySelectorAll('.option-chip').forEach(ch=>{let n=ch.textContent.replace(/\+¥\d+/,'').trim();
    if(Array.isArray(sel))ch.classList.toggle('selected',sel.includes(n));else ch.classList.toggle('selected',n===sel)});
}
function selectOption(k,v){currentSel[k]=v;updateModalAfterChange()}
function toggleTopping(n){const i=currentSel.toppings.indexOf(n);if(i>=0)currentSel.toppings.splice(i,1);else currentSel.toppings.push(n);updateModalAfterChange()}
function changeQty(d){currentSel.qty=Math.max(1,Math.min(99,currentSel.qty+d));updateModalAfterChange()}

function quickAdd(catId,itemId){
  const d=findDrink(catId,itemId);if(!d)return;
  cart.push({id:Date.now(),drinkId:itemId,name:d.name,emoji:d.emoji,image_url:d.image_url,basePrice:d.price,temperature:optionsData.temperature[0]||'中号',sweetness:optionsData.sweetness[0]||'白釉',toppings:[],qty:1});
  updateCartUI();pulseCart();
  if(currentTab===2) renderCartPage();
}
function addToCart(){
  if(!currentDrink)return;
  cart.push({id:Date.now(),drinkId:currentDrink.itemId,name:currentDrink.name,emoji:currentDrink.emoji,image_url:currentDrink.image_url,basePrice:currentDrink.price,temperature:currentSel.temperature,sweetness:currentSel.sweetness,toppings:[...currentSel.toppings],qty:currentSel.qty});
  updateCartUI();closeModal();pulseCart();
  if(currentTab===2) renderCartPage();
}
function pulseCart(){const i=document.querySelector('.cart-icon');if(i){i.style.transform='scale(1.15)';setTimeout(()=>i.style.transform='',200)}}

function getItemPrice(it){const tp=it.toppings.reduce((s,t)=>{const o=optionsData.toppings.find(x=>x.name===t);return s+(o?o.price:0)},0);return(it.basePrice+tp)*it.qty}
function cartTotal(){return cart.reduce((s,i)=>s+getItemPrice(i),0)}
function cartCount(){return cart.reduce((s,i)=>s+i.qty,0)}

function updateCartUI(){
  const cnt=cartCount(),tot=cartTotal();
  const badge=document.getElementById('tabCartBadge');
  if(cnt>0){badge.classList.remove('hidden');badge.textContent=cnt}
  else{badge.classList.add('hidden')}
  const dt=document.getElementById('cartDrawerTotal'),dc=document.getElementById('cartDrawerCheckout');
  if(dt){dt.textContent=tot;dc.disabled=cnt===0}
  // Shop cart bar
  const bar=document.getElementById('shopCartBar');
  if(bar){
    if(cnt>0){bar.style.display='block';const sc=document.getElementById('shopCartCount');const st=document.getElementById('shopCartTotal');if(sc)sc.textContent=cnt;if(st)st.textContent='¥'+tot}
    else bar.style.display='none';
  }
  // Update expanded cart
  renderShopCartExpand();
}

function toggleShopCartExpand(){
  const el=document.getElementById('shopCartExpand');
  if(el.style.display==='none'||!el.style.display) el.style.display='block';
  else el.style.display='none';
  renderShopCartExpand();
}
function renderShopCartExpand(){
  const el=document.getElementById('shopCartExpand');
  if(!el||el.style.display==='none')return;
  el.innerHTML=cart.map((it,i)=>`
    <div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:0.5px solid var(--border)">
      <div style="width:48px;height:48px;border-radius:8px;background:linear-gradient(135deg,#f0ebe2,#e8dfd4);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;overflow:hidden">
        ${it.image_url?`<img src="${it.image_url}" style="width:100%;height:100%;object-fit:cover">`:getEmoji(it.drinkId)}
      </div>
      <div style="flex:1;min-width:0">
        <div style="font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${it.name}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:2px">${it.temperature} · ${it.sweetness}${it.toppings.length?' · '+it.toppings.join('+'):''}</div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-size:14px;font-weight:700;color:var(--accent-dark)">¥${it.basePrice*it.qty}</div>
        <div style="font-size:12px;color:var(--text3)">×${it.qty}</div>
      </div>
    </div>
  `).join('')||'<div style="padding:12px 0;text-align:center;color:var(--text3);font-size:13px">购物车为空</div>';
}

function setupCartListeners(){
  document.getElementById('cartClearBtn').addEventListener('click',clearCart);
  document.getElementById('cartDrawer').addEventListener('click',function(e){if(e.target===this)closeCartDrawer()});
  document.getElementById('cartDrawerCheckout').addEventListener('click',checkout);
}
function toggleCart(){
  const d=document.getElementById('cartDrawer');
  if(d.classList.contains('hidden')){renderCartDrawer();d.classList.remove('hidden');document.body.style.overflow='hidden'}
  else closeCartDrawer();
}
function closeCartDrawer(){document.getElementById('cartDrawer').classList.add('hidden');document.body.style.overflow=''}
function clearCart(){cart=[];updateCartUI();renderCartDrawer();closeCartDrawer()}

function renderCartDrawer(){
  const b=document.getElementById('cartDrawerBody'),cnt=cartCount();
  document.getElementById('cartDrawerTotal').textContent=cartTotal();
  document.getElementById('cartDrawerCheckout').disabled=cnt===0;
  if(!cart.length){b.innerHTML='<div class="cart-drawer-empty"><div style="font-size:56px">🛒</div><p>购物车是空的</p><p style="font-size:12px;margin-top:4px">快去挑选喜欢的饮品吧~</p></div>';return}
  b.innerHTML=cart.map((it,i)=>{
    const p=getItemPrice(it),opts=[it.temperature,it.sweetness,...it.toppings.map(t=>'+'+t)].join(' · ');
    return `<div class="cart-item">
      <div class="cart-item-img">${it.image_url?`<img src="${it.image_url}" alt="">`:it.emoji||'🏺'}</div>
      <div class="cart-item-info"><div class="cart-item-name">${it.name}</div><div class="cart-item-opts">${opts}</div><div class="cart-item-price">${p}</div></div>
      <div class="cart-item-qty"><button data-idx="${i}" data-d="-1">−</button><span>${it.qty}</span><button data-idx="${i}" data-d="1">+</button></div></div>`;
  }).join('');
  b.querySelectorAll('.cart-item-qty button').forEach(btn=>btn.addEventListener('click',()=>{
    const idx=parseInt(btn.dataset.idx);cart[idx].qty+=parseInt(btn.dataset.d);
    if(cart[idx].qty<=0)cart.splice(idx,1);updateCartUI();renderCartDrawer();
  }));
}

async function checkout(){
  if(!cart.length)return;const tot=cartTotal(),cnt=cartCount();
  // Step 1: Show payment first
  const pay=await api('/api/payment');
  const hasPay=pay.alipay||pay.wechat;
  const orderSummary=cart.map(it=>it.name+' ×'+it.qty).join('、');
  if(hasPay){
    // Show payment screen first
    let payHtml='<div style="text-align:left;font-size:13px;color:var(--text2);margin-top:4px;line-height:1.6">'+orderSummary+'</div><div style="margin-top:8px">'+cnt+'件商品 · <strong>¥'+tot+'</strong></div>';
    payHtml+='<div style="margin-top:16px;padding-top:12px;border-top:0.5px solid var(--border)"><div style="font-size:14px;font-weight:600;margin-bottom:12px">💰 请付款后再确认订单</div>';
    if(pay.alipay) payHtml+=/\.(png|jpg|jpeg|gif|webp)(\?|$)/i.test(pay.alipay)
      ?'<div style="text-align:center;margin:8px 0"><img src="'+pay.alipay+'" style="max-width:200px;border-radius:8px" alt="支付宝收款码"><br><span style="font-size:11px;color:var(--text3)">💙 支付宝扫码付款</span></div>'
      :'<button onclick="window.open(\''+pay.alipay+'\');event.stopPropagation()" style="display:block;width:100%;margin:6px 0;padding:12px;background:#1677FF;color:#fff;border:none;border-radius:12px;font-weight:600;font-size:15px;cursor:pointer;font-family:var(--font)">💙 支付宝付款</button>';
    if(pay.wechat) payHtml+=/\.(png|jpg|jpeg|gif|webp)(\?|$)/i.test(pay.wechat)
      ?'<div style="text-align:center;margin:8px 0"><img src="'+pay.wechat+'" style="max-width:200px;border-radius:8px" alt="微信收款码"><br><span style="font-size:11px;color:var(--text3)">💚 微信扫码付款</span></div>'
      :'<button onclick="window.open(\''+pay.wechat+'\');event.stopPropagation()" style="display:block;width:100%;margin:6px 0;padding:12px;background:#07C160;color:#fff;border:none;border-radius:12px;font-weight:600;font-size:15px;cursor:pointer;font-family:var(--font)">💚 微信付款</button>';
    payHtml+='</div><button class="btn-checkout" style="margin-top:16px;width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;font-family:var(--font)" onclick="confirmOrderFromPay(this)">✅ 我已完成付款，确认订单</button>';
    showToast('💳','请先付款',payHtml,'');
  }else{
    // No payment configured, just confirm directly
    showToast('📋','确认下单？',orderSummary+'<div style="margin-top:8px">'+cnt+'件商品 · <strong>¥'+tot+'</strong></div>',
      '<button class="btn-checkout" style="margin-top:12px;width:100%" onclick="this.closest(\'.order-toast\')?.remove();document.body.style.overflow=\'\';confirmOrder()">✅ 确认提交</button>');
  }
}

async function confirmOrderFromPay(btn){
  const toast=btn.closest('.order-toast');
  // Replace content with loading
  const card=toast.querySelector('.toast-card');
  card.innerHTML='<div class="toast-icon">⏳</div><div class="toast-title">正在确认订单...</div>';
  try{
    const tot=cartTotal(),cnt=cartCount();
    const items=cart.map(it=>({menu_item_id:it.drinkId,item_name:it.name,base_price:it.basePrice,quantity:it.qty,temperature:it.temperature,sweetness:it.sweetness,toppings:it.toppings}));
    const headers={'Content-Type':'application/json'};if(userToken)headers['Authorization']='Bearer '+userToken;
    const order=await api('/api/orders',{method:'POST',headers,body:JSON.stringify({items})});
    cart=[];updateCartUI();renderCartDrawer();closeCartDrawer();
    if(currentTab===2) renderCartPage();
    if(currentTab===3) renderMyPage();
    // Transition to success
    card.innerHTML='<div class="toast-icon">✅</div><div class="toast-title">已提交！</div><div class="toast-desc">'+cnt+'件商品 · <strong>¥'+tot+'</strong></div><div style="font-size:12px;color:var(--text3)">下单号 <strong style="color:var(--accent-dark);font-size:16px">'+order.order_no+'</strong></div><div style="font-size:11px;color:#e25c3b;margin-top:6px">⚠️ 商家确认收款后订单生效</div><button class="btn-checkout toast-close" style="margin-top:16px;background:#1a1a1a;color:#fff">好的</button></div>';
    // Re-bind close
    card.querySelector('.toast-close').addEventListener('click',()=>{toast.remove();document.body.style.overflow=''});
  }catch(e){
    card.innerHTML='<div class="toast-icon">❌</div><div class="toast-title">下单失败</div><div class="toast-desc">'+e.message+'</div><button class="btn-checkout toast-close" style="margin-top:16px">好的</button></div>';
    card.querySelector('.toast-close').addEventListener('click',()=>{toast.remove();document.body.style.overflow=''});
  }
}

async function confirmOrder(){
  const tot=cartTotal(),cnt=cartCount();
  try{
    const items=cart.map(it=>({menu_item_id:it.drinkId,item_name:it.name,base_price:it.basePrice,quantity:it.qty,temperature:it.temperature,sweetness:it.sweetness,toppings:it.toppings}));
    const headers={'Content-Type':'application/json'};if(userToken)headers['Authorization']='Bearer '+userToken;
    const order=await api('/api/orders',{method:'POST',headers,body:JSON.stringify({items})});
    cart=[];updateCartUI();renderCartDrawer();closeCartDrawer();
    if(currentTab===2) renderCartPage();
    if(currentTab===3) renderMyPage();
    showToast('✅','下单成功！','<div style="font-size:13px;color:var(--text2)">'+cnt+'件商品 · <strong>¥'+tot+'</strong></div>',
      '下单号 <strong style="color:var(--accent-dark);font-size:16px">'+order.order_no+'</strong>');
  }catch(e){alert('下单失败: '+e.message)}
}

function showToast(icon,title,desc,extra){
  const t=document.createElement('div');t.className='order-toast';
  t.innerHTML=`<div class="toast-card"><div class="toast-icon">${icon}</div><div class="toast-title">${title}</div><div class="toast-desc">${desc}</div><div style="font-size:12px;color:var(--text3)">${extra||''}</div><button class="btn-checkout toast-close" style="margin-top:16px">好的</button></div>`;
  document.body.appendChild(t);document.body.style.overflow='hidden';
  t.querySelector('.toast-close').addEventListener('click',()=>{t.remove();document.body.style.overflow=''});
  setTimeout(()=>{try{if(t.parentNode){t.remove();document.body.style.overflow=''}}catch(e){document.body.style.overflow=''}},5000);
  // Safety: click outside toast to close
  t.addEventListener('click',function(e){if(e.target===t){t.remove();document.body.style.overflow=''}});
}

// ── Login ──
function showLogin(){
  document.getElementById('loginPassword').value='';
  document.getElementById('loginError').style.display='none';
  document.getElementById('loginOverlay').classList.remove('hidden');
  setTimeout(()=>document.getElementById('loginPassword').focus(),200);
}
function closeLogin(){document.getElementById('loginOverlay').classList.add('hidden')}
async function doLogin(){
  const pw=document.getElementById('loginPassword').value;
  if(!pw){document.getElementById('loginError').textContent='请输入密码';document.getElementById('loginError').style.display='block';return}
  try{
    const r=await fetch(API+'/api/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})});
    if(!r.ok){const e=await r.json();document.getElementById('loginError').textContent=e.detail||'密码错误';document.getElementById('loginError').style.display='block';return}
    const d=await r.json();adminToken=d.token;localStorage.setItem('guming_admin_token',adminToken);
    closeLogin();isAdmin=true;toggleAdmin();
  }catch(e){document.getElementById('loginError').textContent='网络错误';document.getElementById('loginError').style.display='block'}
}

let isToggling=false;
function toggleAdmin(){
  if(isToggling)return;
  isToggling=true;
  const toggle=document.getElementById('adminToggle');
  if(isAdmin){
    toggle.classList.add('active');
    loadAdminPanel();
  }else{
    toggle.classList.remove('active');
    switchTab(currentTab);
  }
  setTimeout(()=>isToggling=false,500);
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

async function saveItem(itemId){
  const item=document.getElementById('admin-item-'+itemId);if(!item)return;
  const name=item.querySelector('[data-field=name]').value.trim();

  const badge=item.querySelector('[data-field=badge]').value;
  const desc=item.querySelector('[data-field=description]').value.trim();
  const catId=item.querySelector('[data-field=category_id]').value;

  try{
    await adminApi(`/api/admin/menu-items/${itemId}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,description:desc,price,badge,category_id:catId})});

// Image Upload
function openUpload(itemId){uploadTargetItemId=itemId;uploadFile=null;
  document.getElementById('uploadFileInput').value='';
  document.getElementById('uploadPreview').innerHTML='';
  document.getElementById('uploadConfirm').disabled=true;
  document.getElementById('uploadOverlay').classList.remove('hidden');
}
function closeUpload(){document.getElementById('uploadOverlay').classList.add('hidden');uploadTargetItemId=null;uploadFile=null}
function handleFileSelect(e){
  const file=e.target.files[0];if(!file)return;
  uploadFile=file;
  const reader=new FileReader();
  reader.onload=ev=>{document.getElementById('uploadPreview').innerHTML=`<img src="${ev.target.result}" alt="">`;document.getElementById('uploadConfirm').disabled=false};
  reader.readAsDataURL(file);
}
async function doUpload(){
  if(!uploadFile||!uploadTargetItemId)return;
  const form=new FormData();form.append('file',uploadFile);
  try{
    const r=await fetch(API+'/api/admin/upload-image',{method:'POST',headers:{'Authorization':'Bearer '+adminToken},body:form});
    if(!r.ok)throw new Error((await r.json()).detail||'上传失败');
    const data=await r.json();
    await adminApi(`/api/admin/menu-items/${uploadTargetItemId}/image?image_url=${encodeURIComponent(data.url)}`,{method:'PUT'});
    const orig=adminItems.find(x=>x.id===uploadTargetItemId);if(orig)orig.image_url=data.url;
    const imgEl=document.querySelector(`#admin-item-${uploadTargetItemId} .admin-item-img`);
    if(imgEl)imgEl.innerHTML=`<img src="${data.url}" alt="">`;
    closeUpload();flashMsg('✅ 图片已更新');
  }catch(e){flashMsg('❌ '+e.message)}
}

    el.innerHTML=`<h2>📋 订单管理 <button class="btn-text" onclick="refreshMenu()">🔙 返回产品管理</button></h2>`+
      (orders.length?orders.map(o=>`
        <div class="cat-manage" style="margin-bottom:12px">
          <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px">
            <b>${o.order_no}</b>
            <span>${o.created_at}</span>
            <select onchange="setOrderStatus('${o.id}',this.value)" style="padding:4px 8px;border-radius:6px;border:1px solid var(--border)">
              ${['pending','paid','shipped','completed','cancelled'].map(s=>`<option value="${s}" ${o.status===s?'selected':''}>${statusLabel[s]}</option>`).join('')}

          </div>
          <div style="font-size:13px;color:var(--text2);margin:6px 0">
            👤 ${o.customer_name||'未填'} · 📞 ${o.customer_phone||'未填'} · 📍 ${o.customer_address||'未填地址'}
          </div>
          ${o.items.map(i=>`<div style="font-size:13px;padding:2px 0">${i.name} ×${i.qty} · ¥${i.price} ${i.temperature} ${i.sweetness} ${i.toppings.length?i.toppings.join('+'):''}</div>`).join('')}
          <div style="text-align:right;font-weight:700;margin-top:4px">合计 ¥${o.total_price} · ${o.item_count}件</div>
        </div>
      `).join(''):'<div class="loading">暂无订单</div>');
  }catch(e){el.innerHTML=`<div class="loading">⚠️ ${e.message}</div>`}
}

// Per-product option management
async function showItemOptions(itemId){
  const el=document.getElementById('tabContent');
  el.innerHTML='<div class="loading">加载中...</div>';
  try{
    // Get both product-specific and global options
    const [prodR,globalR]=await Promise.all([
      adminApi('/api/admin/options?product_id='+itemId),
      adminApi('/api/admin/options?product_id=')
    ]);
    const item=adminItems.find(i=>i.id===itemId);
    const labels={temperature:'📏 尺寸',sweetness:'🎨 釉色',toppings:'🔧 工艺'};
    // Merge: product-specific takes priority
    const groups={};
    for(const g of ['temperature','sweetness','toppings']){
      const prod=prodR.options.filter(o=>o.group_key===g);
      groups[g]=prod.length>0?prod:globalR.options.filter(o=>o.group_key===g);
    }
    el.innerHTML=`
      <div class="my-page">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
          <button class="btn-text" onclick="renderAdminPanel()">← 返回</button>
          <span style="font-size:14px;font-weight:600">⚙️ ${item?.name||itemId} 的选项</span>
        </div>
        ${Object.entries(groups).map(([g,items])=>`
          <div style="background:var(--bg-card);border-radius:12px;padding:10px 12px;margin-bottom:8px">
            <div style="display:flex;justify-content:space-between;align-items:center">
              <b style="font-size:13px">${labels[g]}</b>
              <button class="btn-text" onclick="addOptInline('${g}','${itemId}')" style="color:var(--accent-dark);font-size:11px">＋ 添加</button>
            </div>
            ${items.map(o=>`<div style="display:flex;align-items:center;gap:6px;margin-top:6px;font-size:13px">
              <input value="${o.name}" onchange="saveOptInline(${o.id},'name',this.value,'${itemId}')" style="flex:1;padding:4px 8px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:var(--font)">
              ${g==='toppings'?`<input type="number" value="${o.price}" onchange="saveOptInline(${o.id},'price',this.value,'${itemId}')" style="width:60px;padding:4px 8px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:var(--font)" placeholder="¥">`:''}
              <button class="btn-text" onclick="delOptInline(${o.id},'${itemId}')" style="color:#e25c3b;font-size:14px;padding:2px 4px">×</button>
            </div>`).join('')||'<div style="color:var(--text3);font-size:12px;margin-top:4px">无选项</div>'}
          </div>
        `).join('')}
        <button class="btn-text" onclick="renderAdminPanel()" style="width:100%;margin-top:8px">← 返回</button>
      </div>`;
  }catch(e){el.innerHTML=`<div class="loading">⚠️ ${e.message}</div>`}
}

function addOptInline(gk,itemId){
  (async()=>{
    try{await adminApi('/api/admin/options?group_key='+gk,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:'新选项',price:0,product_id:itemId})});showItemOptions(itemId)}catch(e){flashMsg('❌ '+e.message)}
  })();
}
function saveOptInline(id,field,value,itemId){
  (async()=>{
    try{
      // Read both name and price from the DOM
      const row=event.target.closest('div');
      const nameInput=row.querySelector('input[type=text]')||row.querySelector('input:first-child');
      const priceInput=row.querySelector('input[type=number]');
      const body={name:nameInput?.value||'',price:priceInput?parseFloat(priceInput.value)||0:0};
      await adminApi('/api/admin/options/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    }catch(e){flashMsg('❌ '+e.message)}
  })();
}
async function delOptInline(id,itemId){
  if(!confirm('删除这个选项？'))return;
  try{await adminApi('/api/admin/options/'+id,{method:'DELETE'});showItemOptions(itemId)}catch(e){flashMsg('❌ '+e.message)}
}

async function changePassword(){
  const oldPwd=document.getElementById('cfgOldPwd').value.trim();
  const newPwd=document.getElementById('cfgNewPwd').value.trim();
  if(!oldPwd||!newPwd){flashMsg('请填写新旧密码');return}
  try{
    await adminApi('/api/admin/change-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({old_password:oldPwd,new_password:newPwd})});
    flashMsg('✅ 密码已修改，下次登录生效');

async function markAsPaid(orderNo){
  try{
    const r=await fetch('/api/user/orders/'+encodeURIComponent(orderNo)+'/pay',{method:'POST',headers:{'Authorization':'Bearer '+userToken}});
    if(r.status===401){userLogout();renderMyPage();flashMsg('登录已过期，请重新登录');return}
    if(!r.ok){const e=await r.json();throw new Error(e.detail||'操作失败')}
    // Close toast
    const toast=document.querySelector('.order-toast');
    if(toast){toast.remove();document.body.style.overflow=''}
    // Refresh to show order moved to 待发货
    showMyOrders('');
    flashMsg('✅ 已标记为已付款，订单移至待发货');
  }catch(e){flashMsg('❌ '+e.message)}
}

async function goPay(orderNo,amount){
  try{
    const pay=await api('/api/payment');
    const hasPay=pay.alipay||pay.wechat;
    if(!hasPay){flashMsg('商家未配置收款方式');return}
    let html='<div style="text-align:center;font-size:14px;font-weight:600;margin-bottom:8px">订单 '+orderNo+' · ¥'+amount+'</div>';
    html+='<div style="border-top:0.5px solid var(--border);padding-top:12px;margin-top:8px"><div style="font-size:14px;font-weight:600;margin-bottom:12px">💰 请扫码付款</div>';
    if(pay.alipay) html+=/\.(png|jpg|jpeg|gif|webp)(\?|$)/i.test(pay.alipay)
      ?'<div style="text-align:center;margin:8px 0"><img src="'+pay.alipay+'" style="max-width:180px;border-radius:8px"><br><span style="font-size:11px;color:var(--text3)">💙 支付宝扫码</span></div>'
      :'<button onclick="window.open(\''+pay.alipay+'\');event.stopPropagation()" style="display:block;width:100%;margin:6px 0;padding:12px;background:#1677FF;color:#fff;border:none;border-radius:12px;font-weight:600;font-size:15px;cursor:pointer;font-family:var(--font)">💙 支付宝付款</button>';
    if(pay.wechat) html+=/\.(png|jpg|jpeg|gif|webp)(\?|$)/i.test(pay.wechat)
      ?'<div style="text-align:center;margin:8px 0"><img src="'+pay.wechat+'" style="max-width:180px;border-radius:8px"><br><span style="font-size:11px;color:var(--text3)">💚 微信扫码</span></div>'
      :'<button onclick="window.open(\''+pay.wechat+'\');event.stopPropagation()" style="display:block;width:100%;margin:6px 0;padding:12px;background:#07C160;color:#fff;border:none;border-radius:12px;font-weight:600;font-size:15px;cursor:pointer;font-family:var(--font)">💚 微信付款</button>';
    html+='</div>';
    html+='<button onclick="markAsPaid(\''+orderNo+'\')" style="margin-top:16px;width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;font-family:var(--font)">✅ 我已完成付款</button>';
    showToast('💳','支付',html,'');
  }catch(e){flashMsg('❌ '+e.message)}
}

// Upload payment QR code
function uploadPayQR(targetId){
  const input=document.createElement('input');
  input.type='file';input.accept='image/*';
  input.onchange=async()=>{
    const file=input.files[0];if(!file)return;
    const fd=new FormData();fd.append('file',file);
    try{
      const r=await fetch('/api/admin/upload-image',{method:'POST',headers:{'Authorization':'Bearer '+adminToken},body:fd});
      if(!r.ok)throw new Error('上传失败');
      const d=await r.json();
      document.getElementById(targetId).value=d.url;
      flashMsg('✅ 收款码已上传');
    }catch(e){flashMsg('❌ '+e.message)}
  };
  input.click();
}

// Flash message
let flashTimer;
function flashMsg(msg){
  let el=document.querySelector('.toast-msg');if(!el){el=document.createElement('div');el.className='toast-msg';document.body.appendChild(el)}
  el.textContent=msg;clearTimeout(flashTimer);flashTimer=setTimeout(()=>el&&el.remove(),2000);
}
